name: Weekly Pharma Tech Radar

on:
  schedule:
    # Runs every Monday at 08:00 UTC. Adjust the cron expression to your
    # preferred day/time — https://crontab.guru is useful for this.
    - cron: "0 8 * * 1"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FWF_API_KEY: ${{ secrets.FWF_API_KEY }}
        run: python main.py

      - name: Commit updated state, digest, and Pages content
        run: |
          git config user.name "pharma-tech-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/ output/ docs/
          git diff --staged --quiet || git commit -m "Weekly digest: $(date -u +'%Y-%m-%d')"
          git push

      - name: Upload digest as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: output/
